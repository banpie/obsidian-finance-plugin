name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is and what you expected to happen.
      placeholder: Describe the issue here...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: What steps did you take to encounter the issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment & Versions
      description: Please share your environment details (e.g., Plugin version, Obsidian version, OS, Python/Beancount version).
      placeholder: |
        - Plugin Version:
        - Obsidian Version:
        - OS (Windows/macOS/Linux/WSL):
        - Python/Beancount version (if setup issue):
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, console logs, BQL queries, screenshots, or error messages here.
      placeholder: Additional details, logs, or screenshots...
