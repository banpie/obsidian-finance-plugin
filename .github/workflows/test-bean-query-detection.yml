name: Test bean-query detection (Issue #74)

on:
  push:
    branches: [Dev, master]
    paths:
      - 'src/utils/SystemDetector.ts'
      - 'src/ui/modals/OnboardingModal.ts'
      - 'scripts/test-bean-query-detection.ts'
      - '.github/workflows/test-bean-query-detection.yml'
  pull_request:
    paths:
      - 'src/utils/SystemDetector.ts'
      - 'src/ui/modals/OnboardingModal.ts'
  workflow_dispatch:

jobs:
  # ── macOS: exact reproduction of reporter's environment (uv + beanquery) ──
  test-macos-uv:
    name: macOS — uv-installed beanquery (Issue #74 scenario)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv and Homebrew bison to PATH for this job
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH

      - name: Install bison via Homebrew (beancount 3.x build requirement)
        run: brew install bison

      - name: Install beanquery via uv (reporter's exact method)
        run: uv tool install beanquery

      - name: Verify bean-query is in ~/.local/bin (not /usr/bin)
        run: |
          which bean-query
          bean-query --version
          # Confirm it's the uv install location
          if [[ "$(which bean-query)" == "$HOME/.local/bin/bean-query" ]]; then
            echo "✔ Confirmed: bean-query installed in ~/.local/bin (uv scenario)"
          else
            echo "⚠ bean-query is in $(which bean-query) — not the expected uv path"
          fi

      - name: Compile test script
        run: |
          npx tsc \
            --module commonjs \
            --target es2020 \
            --esModuleInterop \
            --skipLibCheck \
            --outDir scripts/dist \
            scripts/test-bean-query-detection.ts

      - name: Run detection test (with full PATH — baseline)
        run: node scripts/dist/test-bean-query-detection.js

      - name: Run detection test (with restricted PATH — simulates macOS Dock launch)
        # Obsidian on macOS launched from Dock/Spotlight gets PATH=/usr/bin:/bin:/usr/sbin:/sbin
        # This directly replicates the conditions under which the bug occurs.
        env:
          PATH: /usr/bin:/bin:/usr/sbin:/sbin
        run: node scripts/dist/test-bean-query-detection.js

  # ── Linux: pip-installed beanquery (additional sanity check) ────────────────
  test-linux-pip:
    name: Linux — pip-installed beanquery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install beanquery via pip
        run: pip3 install beanquery --break-system-packages

      - name: Compile and run detection test
        run: |
          npx tsc \
            --module commonjs \
            --target es2020 \
            --esModuleInterop \
            --skipLibCheck \
            --outDir scripts/dist \
            scripts/test-bean-query-detection.ts
          node scripts/dist/test-bean-query-detection.js

  # ── macOS: pipx-installed beanquery (another common install method) ─────────
  test-macos-pipx:
    name: macOS — pipx-installed beanquery
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install bison and pipx via Homebrew (beancount 3.x build requirement)
        run: brew install bison pipx

      - name: Install beanquery via pipx
        run: |
          # Add bison to PATH so beancount builds correctly
          export PATH="/opt/homebrew/opt/bison/bin:$PATH"
          pipx install beanquery
          # pipx installs to ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Compile test script
        run: |
          npx tsc \
            --module commonjs \
            --target es2020 \
            --esModuleInterop \
            --skipLibCheck \
            --outDir scripts/dist \
            scripts/test-bean-query-detection.ts

      - name: Run detection test with restricted PATH
        env:
          PATH: /usr/bin:/bin:/usr/sbin:/sbin
        run: node scripts/dist/test-bean-query-detection.js
